name: P0 Local Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  p0-local:
    name: Windows local-only P0 validation
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm.cmd ci

      - name: Run unified local P0 integration
        run: npm.cmd run test:p0:local
