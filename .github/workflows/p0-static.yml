name: P0 Static Gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  p0-static:
    name: Local-only P0 validation
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm.cmd ci

      - name: Run local P0 static gates
        run: npm.cmd run test:p0:static

      - name: Verify frontend inventory
        run: node.exe scripts/p0/verify-frontend-inventory.mjs

      - name: Run backend read-only SQL validator self-test
        shell: powershell
        run: |
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\scripts\p0\validate-catalog-snapshot-readonly.ps1" -SelfTest

      - name: Build frontend
        run: npm.cmd run build
