name: P0 Local Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  p0-local:
    name: Windows local-only P0 validation
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm.cmd ci

      - name: Run unified local P0 integration
        run: npm.cmd run test:p0:local

  p0-database:
    name: Linux isolated P0 database validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Start isolated local Postgres
        run: supabase db start --workdir scripts/p0/ci-runtime --yes

      - name: Run database permission and business gates
        run: node scripts/p0/run-ci-database-gates.mjs

      - name: Remove isolated local Postgres
        if: always()
        run: supabase stop --no-backup --workdir scripts/p0/ci-runtime --yes
